# =============================================================================
# Prometheus Configuration
# Scrape metrics dari semua service dalam stack
# =============================================================================

global:
  scrape_interval: 15s        # Interval default pengambilan metrics
  evaluation_interval: 15s    # Interval evaluasi alerting rules
  scrape_timeout: 10s         # Timeout per scrape

# =============================================================================
# Scrape Configs
# =============================================================================
scrape_configs:
  # -------------------------------------------------------------------------
  # Prometheus — Self-monitoring
  # -------------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # -------------------------------------------------------------------------
  # Backend — Go + Echo (expose /metrics via middleware)
  # -------------------------------------------------------------------------
  - job_name: "backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8080"]
        labels:
          service: "backend"

  # -------------------------------------------------------------------------
  # OpenTelemetry Collector — Internal metrics
  # -------------------------------------------------------------------------
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          service: "otel-collector"

  # -------------------------------------------------------------------------
  # Redis — via Redis Exporter (opsional, aktifkan jika ditambahkan)
  # -------------------------------------------------------------------------
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
  #       labels:
  #         service: "redis"

  # -------------------------------------------------------------------------
  # PostgreSQL — via Postgres Exporter (opsional, aktifkan jika ditambahkan)
  # -------------------------------------------------------------------------
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
  #       labels:
  #         service: "postgres"

  # -------------------------------------------------------------------------
  # MinIO — Built-in metrics
  # -------------------------------------------------------------------------
  - job_name: "minio"
    metrics_path: "/minio/v2/metrics/cluster"
    static_configs:
      - targets: ["minio:9000"]
        labels:
          service: "minio"

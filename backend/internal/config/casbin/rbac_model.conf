[request_definition]
# Tambahkan 'dom' (domain/tenant_id)
r = sub, dom, obj, act

[policy_definition]
# Tambahkan 'dom' (domain/tenant_id)
p = sub, dom, obj, act

[role_definition]
# Gunakan 3 parameter: _, _, _ (User, Role, Domain/Tenant)
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# Pastikan mengecek domain yang sama: r.dom == p.dom
# Dan g() mengecek role di dalam domain tersebut: g(r.sub, p.sub, r.dom)
m = g(r.sub, p.sub, r.dom) && r.dom == p.dom && keyMatch2(r.obj, p.obj) && regexMatch(r.act, p.act)
